<div class="edit-profile-container flex items-center flex-col p-6">
  <h1 class="text-4xl font-extrabold mb-4">Edit Profile</h1>

  <form [formGroup]="PasswordForm" (ngSubmit)="changePassword()" class="space-y-6 w-150">

    <div class="flex gap-2 flex-col">
      <label class="text-sm text-gray-400">Current password</label>
      <input
        formControlName="oldPassword"
        class="p-2 rounded-3xl shadow-lg text-black border-2 border-gray-400 focus:border-blue-500 outline-none"
        placeholder="Enter current password" />
    </div>

    <div class="flex gap-2 flex-col">
      <label class="text-sm text-gray-400">Re-enter current password</label>
      <input
        formControlName="reEnterOldPassword"
        class="p-2 rounded-3xl shadow-lg text-black border-2 border-gray-400 focus:border-blue-500 outline-none"
        placeholder="Re-enter current password" />
    </div>

    @if (PasswordForm.hasError('passwordMismatch') && PasswordForm.get('reEnterOldPassword')?.touched) {
      <p class="text-red-500 text-sm mt-1">
        Passwords do not match!
      </p>
    }

    <div class="flex gap-2 flex-col">
      <label class="text-sm text-gray-400">New password</label>
      <input
        formControlName="newPassword"
        class="p-2 rounded-3xl shadow-lg text-black border-2 border-gray-400 focus:border-blue-500 outline-none"
        placeholder="Enter new password" />
    </div>

    <div class="w-full flex items-center justify-center">
      <button
        type="submit"
        [disabled]="PasswordForm.invalid"
        class=" bg-black hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-3xl disabled:opacity-50 transition-all">
        {{ 'Change Password' }}
      </button>
    </div>
  </form>
</div>
